<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE ONLINE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Geist:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --panel: rgba(15, 15, 25, 0.92);
    --border: #f0c040;
    --border-dim: rgba(240, 192, 64, 0.3);
    --text: #e8e0d0;
    --text-dim: #8a8070;
    --accent: #f0c040;
    --danger: #e05040;
    --success: #50d060;
    --blue: #40a0f0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Login Screen ─────────────────────────── */
  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: var(--bg);
  }

  #login-screen h1 {
    font-family: 'Bangers', cursive;
    font-size: 72px;
    color: var(--accent);
    text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
    letter-spacing: 6px;
    margin-bottom: 8px;
  }

  #login-screen .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  #login-screen input {
    background: rgba(255,255,255,0.05);
    border: 2px solid var(--border-dim);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-size: 16px;
    padding: 12px 20px;
    border-radius: 4px;
    width: 280px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  #login-screen input:focus { border-color: var(--accent); }

  #login-screen button {
    margin-top: 16px;
    padding: 12px 40px;
    background: var(--accent);
    color: #000;
    border: 3px solid #000;
    font-family: 'Bangers', cursive;
    font-size: 22px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    transition: transform 0.1s;
    box-shadow: 3px 3px 0 #000;
  }

  #login-screen button:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 #000;
  }

  #login-screen button:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #000;
  }

  /* ── Game Layout ──────────────────────────── */
  #game-screen {
    display: none;
    height: 100vh;
    width: 100vw;
  }

  #game-screen.active {
    display: grid;
    grid-template-columns: 280px 1fr 300px;
    grid-template-rows: auto 1fr auto;
    gap: 0;
  }

  /* ── Top Bar ──────────────────────────────── */
  #top-bar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 2px solid var(--border-dim);
  }

  #top-bar .logo {
    font-family: 'Bangers', cursive;
    font-size: 24px;
    color: var(--accent);
    letter-spacing: 3px;
  }

  #top-bar .player-info {
    display: flex;
    gap: 24px;
    font-size: 13px;
  }

  #top-bar .player-info span { color: var(--text-dim); }
  #top-bar .player-info strong { color: var(--accent); }

  /* ── Panels ───────────────────────────────── */
  .panel {
    background: var(--panel);
    border-right: 2px solid var(--border-dim);
    overflow-y: auto;
    padding: 12px;
  }

  .panel:last-of-type {
    border-right: none;
    border-left: 2px solid var(--border-dim);
  }

  .panel-title {
    font-family: 'Bangers', cursive;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border-dim);
    padding-bottom: 8px;
    margin-bottom: 10px;
  }

  /* ── Navigation Panel (left) ──────────────── */
  #nav-panel .system-btn {
    display: block;
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 4px;
    background: rgba(255,255,255,0.03);
    border: 2px solid transparent;
    border-radius: 3px;
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
  }

  #nav-panel .system-btn:hover {
    border-color: var(--border-dim);
    background: rgba(255,255,255,0.06);
  }

  #nav-panel .system-btn.current {
    border-color: var(--accent);
    background: rgba(240, 192, 64, 0.08);
  }

  #nav-panel .system-btn .sys-name { font-weight: 600; }
  #nav-panel .system-btn .sys-type {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Canvas (center) ──────────────────────── */
  #viewport { position: relative; overflow: hidden; }
  #viewport canvas { width: 100%; height: 100%; display: block; }

  /* ── Market Panel (right) ─────────────────── */
  .market-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 8px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px;
  }

  .market-row .commodity-name { font-weight: 500; }
  .market-row .price { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
  .market-row .supply { color: var(--text-dim); font-size: 11px; }

  .trade-btns { display: flex; gap: 4px; }

  .trade-btn {
    padding: 3px 8px;
    font-size: 11px;
    font-family: 'Bangers', cursive;
    letter-spacing: 1px;
    border: 2px solid #000;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 1px 1px 0 #000;
  }

  .trade-btn.buy { background: var(--success); color: #000; }
  .trade-btn.sell { background: var(--danger); color: #fff; }

  /* ── Cargo Section ────────────────────────── */
  .cargo-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .cargo-row .qty { color: var(--text); font-weight: 600; }

  /* ── Players List ─────────────────────────── */
  .player-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    font-size: 12px;
  }

  .player-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }

  /* ── Bottom Bar / Chat ────────────────────── */
  #bottom-bar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: var(--panel);
    border-top: 2px solid var(--border-dim);
  }

  #chat-log {
    flex: 1;
    display: flex;
    gap: 16px;
    overflow-x: auto;
    font-size: 12px;
    color: var(--text-dim);
  }

  #chat-log .msg .sender { color: var(--accent); }

  #chat-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-dim);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 3px;
    width: 250px;
    outline: none;
  }

  #chat-input:focus { border-color: var(--accent); }

  /* ── Toast ────────────────────────────────── */
  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--panel);
    border: 2px solid var(--accent);
    padding: 10px 24px;
    font-family: 'Bangers', cursive;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent);
    z-index: 50;
    opacity: 0;
    transition: all 0.3s;
    box-shadow: 3px 3px 0 #000;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* ── Ship Dealer ───────────────────────────── */
  .ship-card {
    background: rgba(255,255,255,0.03);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }

  .ship-card:hover { border-color: var(--border-dim); }

  .ship-card.equipped {
    border-color: var(--accent);
    background: rgba(240, 192, 64, 0.06);
  }

  .ship-card .ship-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .ship-card .ship-name {
    font-family: 'Bangers', cursive;
    font-size: 15px;
    letter-spacing: 1px;
  }

  .ship-card .ship-rarity {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 2px 6px;
    border: 1px solid;
    border-radius: 2px;
  }

  .ship-card .ship-manufacturer {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .ship-card .ship-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .ship-card .stat-bar-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
    font-size: 11px;
  }

  .ship-card .stat-label {
    width: 50px;
    color: var(--text-dim);
    text-transform: uppercase;
    font-size: 9px;
    letter-spacing: 0.5px;
  }

  .ship-card .stat-bar {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .ship-card .stat-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.3s;
  }

  .ship-card .stat-value {
    width: 28px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 10px;
    color: var(--text);
  }

  .ship-card .ship-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .ship-card .ship-price {
    font-family: 'Bangers', cursive;
    font-size: 16px;
    letter-spacing: 1px;
  }

  .buy-ship-btn {
    padding: 5px 14px;
    background: var(--blue);
    color: #000;
    border: 2px solid #000;
    font-family: 'Bangers', cursive;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 2px 2px 0 #000;
    transition: transform 0.1s;
  }

  .buy-ship-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 #000;
  }

  .buy-ship-btn.equipped-label {
    background: var(--accent);
    cursor: default;
    opacity: 0.7;
  }

  /* ── Scrollbar ────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <h1>SPACE ONLINE</h1>
  <p class="subtitle">explore &middot; trade &middot; conquer</p>
  <input id="name-input" type="text" placeholder="Enter pilot name..." maxlength="20" autofocus />
  <button id="login-btn">LAUNCH</button>
</div>

<!-- Game -->
<div id="game-screen">
  <div id="top-bar">
    <div class="logo">SPACE ONLINE</div>
    <div class="player-info">
      <div><span>PILOT:</span> <strong id="hud-name"></strong></div>
      <div><span>CREDITS:</span> <strong id="hud-credits"></strong></div>
      <div><span>SYSTEM:</span> <strong id="hud-system"></strong></div>
      <div><span>SHIP:</span> <strong id="hud-ship"></strong></div>
    </div>
  </div>

  <div id="nav-panel" class="panel">
    <div class="panel-title">NAVIGATION</div>
    <div id="system-info"></div>
    <div class="panel-title" style="margin-top:16px">JUMP GATES</div>
    <div id="jump-list"></div>
    <div class="panel-title" style="margin-top:16px">PILOTS IN SYSTEM</div>
    <div id="players-list"></div>
  </div>

  <div id="viewport">
    <canvas id="canvas"></canvas>
  </div>

  <div id="market-panel" class="panel">
    <div class="panel-title">STATION MARKET</div>
    <div id="market-list"></div>
    <div class="panel-title" style="margin-top:16px">CARGO HOLD</div>
    <div id="cargo-list"></div>
    <div class="panel-title" style="margin-top:16px">SHIP DEALER</div>
    <div id="ship-list"></div>
  </div>

  <div id="bottom-bar">
    <div id="chat-log"></div>
    <input id="chat-input" type="text" placeholder="Chat..." maxlength="200" />
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { SYSTEMS, JUMP_LANES, getConnections, COMMODITIES } from '/shared/galaxy.js';
import { SHIPS, MANUFACTURERS, RARITY_COLORS, SHIP_DEALERS, getCargoCapacity, getCargoUsed } from '/shared/ships.js';

// ── State ─────────────────────────────────────

let player = null;
let marketPrices = {};  // { systemId: { commodityId: { price, supply } } }
let playersInSystem = []; // placeholder for future MMO
let currentSystem = null;

const $ = (s) => document.querySelector(s);
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

// ── Helpers ───────────────────────────────────

function createEl(tag, attrs = {}, children = []) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'textContent') el.textContent = v;
    else if (k === 'className') el.className = v;
    else if (k === 'onclick') el.onclick = v;
    else if (k.startsWith('style_')) el.style[k.slice(6)] = v;
    else el.setAttribute(k, v);
  }
  for (const child of children) {
    if (typeof child === 'string') el.appendChild(document.createTextNode(child));
    else el.appendChild(child);
  }
  return el;
}

// ── Save / Load (localStorage) ────────────────

const SAVE_KEY = 'space-online-save';

function saveGame() {
  const data = {
    player,
    marketPrices,
    version: 1,
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}

// ── Market Generation ─────────────────────────

function getSystemPriceModifier(systemType, commodityId) {
  const modifiers = {
    hub:        { fuel: 1.0, ore: 1.1, electronics: 0.9, weapons: 1.2, food: 0.9, medicine: 0.9, luxuries: 1.0, scrap: 1.1 },
    industrial: { fuel: 0.8, ore: 0.6, electronics: 1.2, weapons: 1.0, food: 1.1, medicine: 1.1, luxuries: 1.5, scrap: 0.7 },
    trade:      { fuel: 1.1, ore: 1.2, electronics: 0.8, weapons: 1.3, food: 0.8, medicine: 0.8, luxuries: 0.7, scrap: 1.2 },
    frontier:   { fuel: 1.3, ore: 0.9, electronics: 1.4, weapons: 0.6, food: 1.3, medicine: 1.3, luxuries: 1.8, scrap: 0.5 },
    military:   { fuel: 0.9, ore: 1.0, electronics: 1.0, weapons: 0.8, food: 1.0, medicine: 0.7, luxuries: 1.4, scrap: 1.0 },
    unknown:    { fuel: 1.5, ore: 0.7, electronics: 1.1, weapons: 1.1, food: 1.5, medicine: 1.5, luxuries: 0.5, scrap: 0.3 },
  };
  return (modifiers[systemType]?.[commodityId] ?? 1.0) * (0.85 + Math.random() * 0.3);
}

function generateAllMarkets() {
  const prices = {};
  for (const system of SYSTEMS) {
    prices[system.id] = {};
    for (const commodity of COMMODITIES) {
      const modifier = getSystemPriceModifier(system.type, commodity.id);
      prices[system.id][commodity.id] = {
        price: Math.round(commodity.basePrice * modifier),
        supply: Math.floor(50 + Math.random() * 100),
      };
    }
  }
  return prices;
}

function fluctuatePrices() {
  for (const systemId in marketPrices) {
    for (const commodityId in marketPrices[systemId]) {
      const row = marketPrices[systemId][commodityId];
      const commodity = COMMODITIES.find(c => c.id === commodityId);
      if (!commodity) continue;
      const change = 1 + (Math.random() - 0.5) * commodity.volatility * 0.1;
      row.price = Math.max(1, Math.round(row.price * change));
      row.supply = Math.max(0, row.supply + Math.floor((Math.random() - 0.45) * 5));
    }
  }
  saveGame();
  if (player) renderMarket(); // refresh if visible
}

setInterval(fluctuatePrices, 30000);

// ── Game Actions ──────────────────────────────

function jumpTo(systemId) {
  const connections = getConnections(player.system_id);
  if (!connections.includes(systemId)) {
    showToast('No jump lane to that system.', true);
    return;
  }
  player.system_id = systemId;
  currentSystem = SYSTEMS.find(s => s.id === systemId);
  saveGame();
  updateUI();
  showToast(`Jumped to ${currentSystem.name}`);
}

function buy(commodityId) {
  const capacity = getCargoCapacity(player.ship);
  const used = getCargoUsed(player.cargo);
  if (used + 1 > capacity) {
    showToast(`Cargo full! ${used}/${capacity} units.`, true);
    return;
  }
  const row = marketPrices[player.system_id]?.[commodityId];
  if (!row || row.supply < 1) {
    showToast('Not enough supply.', true);
    return;
  }
  if (player.credits < row.price) {
    showToast('Not enough credits.', true);
    return;
  }
  player.credits -= row.price;
  player.cargo[commodityId] = (player.cargo[commodityId] || 0) + 1;
  row.supply -= 1;
  saveGame();
  updateUI();
  showToast('Purchase complete');
}

function sell(commodityId) {
  if (!player.cargo[commodityId] || player.cargo[commodityId] < 1) {
    showToast('Nothing to sell.', true);
    return;
  }
  const row = marketPrices[player.system_id]?.[commodityId];
  if (!row) return;
  player.credits += row.price;
  player.cargo[commodityId] -= 1;
  if (player.cargo[commodityId] <= 0) delete player.cargo[commodityId];
  row.supply += 1;
  saveGame();
  updateUI();
  showToast('Sale complete');
}

function buyShip(shipId) {
  const ship = SHIPS[shipId];
  if (!ship) return;
  const sys = SYSTEMS.find(s => s.id === player.system_id);
  const dealerShips = SHIP_DEALERS[sys.type] || [];
  if (!dealerShips.includes(shipId)) {
    showToast('This ship isn\'t sold here.', true);
    return;
  }
  if (player.ship === shipId) {
    showToast('You already fly this ship.', true);
    return;
  }
  const oldShip = SHIPS[player.ship];
  const tradeInValue = oldShip ? Math.floor(oldShip.price * 0.5) : 0;
  const finalCost = ship.price - tradeInValue;
  if (player.credits < finalCost) {
    showToast(`Need \u00A2${finalCost.toLocaleString()} (after trade-in).`, true);
    return;
  }
  const currentCargo = getCargoUsed(player.cargo);
  if (currentCargo > ship.stats.cargo) {
    showToast(`Cargo won't fit! Sell ${currentCargo - ship.stats.cargo} units first.`, true);
    return;
  }
  player.credits -= finalCost;
  player.ship = shipId;
  saveGame();
  updateUI();
  showToast(`New ship: ${ship.name}!`);
}

// ── Login ─────────────────────────────────────

$('#login-btn').onclick = () => {
  const name = ($('#name-input').value.trim() || 'Pilot').slice(0, 20);

  // Try loading existing save
  const save = loadGame();
  if (save && save.player) {
    player = save.player;
    player.name = name; // allow name change
    marketPrices = save.marketPrices || generateAllMarkets();
  } else {
    player = {
      id: crypto.randomUUID(),
      name,
      credits: 1000,
      system_id: 'sol',
      cargo: {},
      ship: 'starter',
    };
    marketPrices = generateAllMarkets();
  }

  currentSystem = SYSTEMS.find(s => s.id === player.system_id);
  saveGame();
  enterGame();
};

$('#name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $('#login-btn').click();
});

// ── Enter Game ────────────────────────────────

function enterGame() {
  $('#login-screen').style.display = 'none';
  $('#game-screen').classList.add('active');
  resizeCanvas();
  updateUI();
  addChatMessage('SYSTEM', `Welcome to Space Online, ${player.name}.`);
  requestAnimationFrame(renderLoop);
}

// ── UI Updates ────────────────────────────────

function updateUI() {
  const shipData = SHIPS[player.ship];
  $('#hud-name').textContent = player.name;
  $('#hud-credits').textContent = `\u00A2${player.credits.toLocaleString()}`;
  $('#hud-system').textContent = currentSystem.name;
  $('#hud-ship').textContent = shipData?.name || player.ship;

  renderSystemInfo();
  renderJumpGates();
  renderMarket();
  renderCargo();
  renderPlayers();
  renderShipDealer();
}

function renderSystemInfo() {
  const container = $('#system-info');
  container.replaceChildren();

  const wrapper = createEl('div', { style_padding: '8px 6px' });

  wrapper.appendChild(createEl('div', {
    textContent: currentSystem.name,
    style_fontWeight: '600',
    style_color: currentSystem.color,
    style_fontSize: '15px',
  }));

  wrapper.appendChild(createEl('div', {
    textContent: currentSystem.type.toUpperCase(),
    style_fontSize: '11px',
    style_color: 'var(--text-dim)',
    style_marginTop: '4px',
    style_letterSpacing: '1px',
  }));

  wrapper.appendChild(createEl('div', {
    textContent: currentSystem.description,
    style_fontSize: '12px',
    style_marginTop: '6px',
    style_lineHeight: '1.4',
  }));

  wrapper.appendChild(createEl('div', {
    textContent: `Stations: ${currentSystem.stations.join(', ')}`,
    style_fontSize: '11px',
    style_color: 'var(--text-dim)',
    style_marginTop: '6px',
  }));

  container.appendChild(wrapper);
}

function renderJumpGates() {
  const container = $('#jump-list');
  container.replaceChildren();

  const conns = getConnections(player.system_id);
  for (const id of conns) {
    const sys = SYSTEMS.find(s => s.id === id);
    const btn = createEl('button', { className: 'system-btn', onclick: () => jumpTo(id) }, [
      createEl('div', { className: 'sys-name', textContent: sys.name, style_color: sys.color }),
      createEl('div', { className: 'sys-type', textContent: sys.type }),
    ]);
    container.appendChild(btn);
  }
}

function renderMarket() {
  const container = $('#market-list');
  container.replaceChildren();

  const systemMarket = marketPrices[player.system_id] || {};
  for (const commodity of COMMODITIES) {
    const row = systemMarket[commodity.id];
    if (!row) continue;

    const marketRow = createEl('div', { className: 'market-row' }, [
      createEl('div', {}, [
        createEl('div', { className: 'commodity-name', textContent: commodity.name }),
        createEl('div', { className: 'supply', textContent: `Supply: ${row.supply}` }),
      ]),
      createEl('div', { className: 'price', textContent: `\u00A2${Math.round(row.price)}` }),
      createEl('div', { className: 'trade-btns' }, [
        createEl('button', { className: 'trade-btn buy', textContent: 'BUY', onclick: () => buy(commodity.id) }),
        createEl('button', { className: 'trade-btn sell', textContent: 'SELL', onclick: () => sell(commodity.id) }),
      ]),
    ]);
    container.appendChild(marketRow);
  }
}

function renderCargo() {
  const container = $('#cargo-list');
  container.replaceChildren();

  const capacity = getCargoCapacity(player.ship);
  const used = getCargoUsed(player.cargo);
  const pct = Math.min(100, (used / capacity) * 100);
  const barColor = pct > 90 ? 'var(--danger)' : pct > 70 ? 'var(--accent)' : 'var(--success)';

  const capRow = createEl('div', { style_padding: '4px 6px', style_marginBottom: '6px' }, [
    createEl('div', {
      style_display: 'flex', style_justifyContent: 'space-between', style_fontSize: '11px', style_marginBottom: '3px',
    }, [
      createEl('span', { textContent: 'Capacity', style_color: 'var(--text-dim)' }),
      createEl('span', { textContent: `${used} / ${capacity}`, style_color: 'var(--text)' }),
    ]),
    createEl('div', {
      style_height: '4px', style_background: 'rgba(255,255,255,0.06)', style_borderRadius: '2px', style_overflow: 'hidden',
    }, [
      createEl('div', {
        style_height: '100%', style_width: `${pct}%`, style_background: barColor, style_borderRadius: '2px',
        style_transition: 'width 0.3s',
      }),
    ]),
  ]);
  container.appendChild(capRow);

  const entries = Object.entries(player.cargo).filter(([, q]) => q > 0);
  if (entries.length === 0) {
    container.appendChild(createEl('div', {
      textContent: 'Empty',
      style_fontSize: '12px',
      style_color: 'var(--text-dim)',
      style_padding: '6px',
    }));
    return;
  }

  for (const [id, qty] of entries) {
    const c = COMMODITIES.find(c => c.id === id);
    container.appendChild(createEl('div', { className: 'cargo-row' }, [
      createEl('span', { textContent: c?.name || id }),
      createEl('span', { className: 'qty', textContent: `x${qty}` }),
    ]));
  }
}

function renderPlayers() {
  const container = $('#players-list');
  container.replaceChildren();

  // Singleplayer for now — will be populated via WebSocket later
  container.appendChild(createEl('div', {
    textContent: 'No other pilots',
    style_fontSize: '12px',
    style_color: 'var(--text-dim)',
    style_padding: '6px',
  }));
}

// ── Ship Dealer ───────────────────────────────

function renderShipDealer() {
  const container = $('#ship-list');
  container.replaceChildren();

  const sys = SYSTEMS.find(s => s.id === player.system_id);
  const dealerShipIds = SHIP_DEALERS[sys.type] || [];
  const availableShips = dealerShipIds.map(id => SHIPS[id]).filter(Boolean);

  if (availableShips.length === 0) {
    container.appendChild(createEl('div', {
      textContent: 'No ships for sale here',
      style_fontSize: '12px',
      style_color: 'var(--text-dim)',
      style_padding: '6px',
    }));
    return;
  }

  const maxCargo = 200, maxHull = 300, maxFirepower = 60;

  for (const ship of availableShips) {
    const isEquipped = player.ship === ship.id;
    const mfr = MANUFACTURERS[ship.manufacturer];
    const rarityColor = RARITY_COLORS[ship.rarity] || '#9a9a9a';

    const oldShip = SHIPS[player.ship];
    const tradeIn = oldShip ? Math.floor(oldShip.price * 0.5) : 0;
    const finalCost = ship.price - tradeIn;

    const card = createEl('div', { className: 'ship-card' + (isEquipped ? ' equipped' : '') });

    card.appendChild(createEl('div', { className: 'ship-header' }, [
      createEl('div', { className: 'ship-name', textContent: ship.name, style_color: mfr.color }),
      createEl('div', {
        className: 'ship-rarity',
        textContent: ship.rarity,
        style_color: rarityColor,
        style_borderColor: rarityColor,
      }),
    ]));

    card.appendChild(createEl('div', { className: 'ship-manufacturer', textContent: mfr.name }));
    card.appendChild(createEl('div', { className: 'ship-desc', textContent: ship.description }));

    const statDefs = [
      { label: 'Cargo', value: ship.stats.cargo, max: maxCargo, color: '#40a0f0' },
      { label: 'Speed', value: Math.round((1 / ship.stats.speed) * 50), max: 100, color: '#a040d0' },
      { label: 'Hull', value: ship.stats.hull, max: maxHull, color: '#50d060' },
      { label: 'Power', value: ship.stats.firepower, max: maxFirepower, color: '#e05040' },
    ];

    for (const stat of statDefs) {
      const pct = Math.min(100, (stat.value / stat.max) * 100);
      card.appendChild(createEl('div', { className: 'stat-bar-row' }, [
        createEl('div', { className: 'stat-label', textContent: stat.label }),
        createEl('div', { className: 'stat-bar' }, [
          createEl('div', {
            className: 'stat-bar-fill',
            style_width: `${pct}%`,
            style_background: stat.color,
          }),
        ]),
        createEl('div', { className: 'stat-value', textContent: stat.value }),
      ]));
    }

    const footer = createEl('div', { className: 'ship-footer' });

    if (isEquipped) {
      footer.appendChild(createEl('div', { className: 'ship-price', textContent: 'EQUIPPED', style_color: 'var(--accent)' }));
      footer.appendChild(createEl('button', { className: 'buy-ship-btn equipped-label', textContent: 'CURRENT' }));
    } else {
      const priceEl = createEl('div', { className: 'ship-price' }, [
        createEl('span', { textContent: `\u00A2${finalCost.toLocaleString()}`, style_color: 'var(--accent)' }),
      ]);
      if (tradeIn > 0) {
        priceEl.appendChild(createEl('div', {
          textContent: `(\u00A2${tradeIn.toLocaleString()} trade-in)`,
          style_fontSize: '10px',
          style_color: 'var(--text-dim)',
          style_fontFamily: "'Geist', sans-serif",
          style_letterSpacing: '0',
        }));
      }
      footer.appendChild(priceEl);
      footer.appendChild(createEl('button', {
        className: 'buy-ship-btn',
        textContent: 'BUY',
        onclick: () => buyShip(ship.id),
      }));
    }

    card.appendChild(footer);
    container.appendChild(card);
  }
}

// ── Chat (local for now, will connect to WS later) ──

$('#chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.value.trim()) {
    addChatMessage(player.name, e.target.value.trim());
    e.target.value = '';
  }
});

function addChatMessage(name, text) {
  const log = $('#chat-log');
  const msg = createEl('div', { className: 'msg' }, [
    createEl('span', { className: 'sender', textContent: name + ':' }),
    document.createTextNode(' ' + text),
  ]);
  log.appendChild(msg);
  while (log.children.length > 50) log.removeChild(log.firstChild);
  log.scrollLeft = log.scrollWidth;
}

// ── Toast ─────────────────────────────────────

function showToast(text, isError = false) {
  const toast = $('#toast');
  toast.textContent = text;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => toast.className = 'toast', 2500);
}

// ── Canvas Rendering ──────────────────────────
// Borderlands-style cel-shaded star map

let animTime = 0;

function resizeCanvas() {
  const rect = $('#viewport').getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

window.addEventListener('resize', resizeCanvas);

const stars = Array.from({ length: 200 }, () => ({
  x: Math.random(),
  y: Math.random(),
  size: Math.random() * 1.5 + 0.5,
  brightness: Math.random() * 0.6 + 0.2,
  twinkleSpeed: Math.random() * 2 + 1,
}));

function renderLoop(t) {
  animTime = t * 0.001;
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;

  ctx.fillStyle = '#06060c';
  ctx.fillRect(0, 0, w, h);

  for (const star of stars) {
    const twinkle = 0.5 + 0.5 * Math.sin(animTime * star.twinkleSpeed + star.x * 100);
    ctx.fillStyle = `rgba(200, 190, 170, ${star.brightness * twinkle})`;
    ctx.fillRect(star.x * w, star.y * h, star.size, star.size);
  }

  if (currentSystem) {
    const grd = ctx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, w * 0.5);
    grd.addColorStop(0, currentSystem.color + '15');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, w, h);
  }

  const padding = 60;
  const scale = Math.min((w - padding * 2) / 1000, (h - padding * 2) / 800);
  const offsetX = (w - 1000 * scale) / 2;
  const offsetY = (h - 800 * scale) / 2;
  const mapX = (x) => x * scale + offsetX;
  const mapY = (y) => y * scale + offsetY;

  for (const [aId, bId] of JUMP_LANES) {
    const a = SYSTEMS.find(s => s.id === aId);
    const b = SYSTEMS.find(s => s.id === bId);
    const ax = mapX(a.x), ay = mapY(a.y);
    const bx = mapX(b.x), by = mapY(b.y);

    const isConnected = player &&
      ((aId === player.system_id && getConnections(player.system_id).includes(bId)) ||
       (bId === player.system_id && getConnections(player.system_id).includes(aId)));

    ctx.strokeStyle = '#000';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();

    ctx.strokeStyle = isConnected ? 'rgba(240, 192, 64, 0.5)' : 'rgba(100, 90, 70, 0.25)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  for (const sys of SYSTEMS) {
    const sx = mapX(sys.x);
    const sy = mapY(sys.y);
    const isCurrent = player && sys.id === player.system_id;
    const isReachable = player && getConnections(player.system_id).includes(sys.id);
    const baseRadius = isCurrent ? 18 : 12;
    const pulse = isCurrent ? Math.sin(animTime * 3) * 3 : 0;
    const r = baseRadius + pulse;

    if (isCurrent || isReachable) {
      const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 3);
      glow.addColorStop(0, sys.color + '30');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(sx - r * 3, sy - r * 3, r * 6, r * 6);
    }

    ctx.beginPath();
    ctx.arc(sx, sy, r + 3, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = isCurrent ? sys.color : (isReachable ? sys.color + 'aa' : sys.color + '40');
    ctx.fill();

    ctx.beginPath();
    ctx.arc(sx - r * 0.25, sy - r * 0.3, r * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fill();

    ctx.font = `bold 12px 'Geist', sans-serif`;
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(sys.name, sx, sy + r + 16);
    ctx.fillStyle = isCurrent ? '#fff' : (isReachable ? '#ccc' : '#666');
    ctx.fillText(sys.name, sx, sy + r + 16);

    if (isCurrent) {
      ctx.font = `11px 'Bangers', cursive`;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.strokeText('YOU ARE HERE', sx, sy - r - 10);
      ctx.fillStyle = '#f0c040';
      ctx.fillText('YOU ARE HERE', sx, sy - r - 10);
    }
  }

  ctx.globalAlpha = 0.02;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < w + h; i += 12) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i - h, h);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  requestAnimationFrame(renderLoop);
}
</script>
